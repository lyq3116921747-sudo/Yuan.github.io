<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#111827">
    <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace | escape }}">
    <meta name="author" content="{{ site.author | escape }}">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="icon" href="{{ '/favicon.ico' | relative_url }}">
    <link rel="apple-touch-icon" href="{{ '/img/icon/apple-touch-icon.png' | relative_url }}">
    <link rel="manifest" href="{{ '/manifest.json' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  </head>
  <body>
    <a class="skip-link" href="#main-content">跳到正文</a>
    <div class="page-backdrop" aria-hidden="true"></div>
    <div class="site-frame">
      {{ content }}
    </div>
  </body>
</html>
